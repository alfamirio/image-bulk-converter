<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Bulk Image Converter</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body { font-family: -apple-system, sans-serif; background: #f9f9f9; padding-bottom: 50px; }
    .card-img-top { height: 120px; object-fit: contain; background-color: #f1f1f1; padding: 0; margin: 0; transition: transform 0.2s ease; }
    .status-badge { font-size: 0.8rem; }
    .img-meta { font-size: 0.75rem; color: #666; }
    .btn-reset-nav { padding: 0.25rem 0.5rem; font-size: 0.75rem; line-height: 1; }
    .img-container { position: relative; overflow: hidden; background-color: #f1f1f1; height: 120px; display: flex; align-items: center; justify-content: center; }
    .rotate-btn { position: absolute; top: 5px; right: 5px; z-index: 10; opacity: 0.8; padding: 2px 6px; }
    .rotate-btn:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="container">
    <div class="d-flex align-items-center">
      <a class="navbar-brand d-flex align-items-center me-2" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-images me-2" viewBox="0 0 16 16">

<div class="container mt-4">
  <div class="card shadow p-4 mb-4">
    <h2 class="text-center mb-4">Bulk Image Converter</h2>
    <p class="text-muted text-center" style="font-size: 0.9em;">All processing happens locally in your browser securely.</p>
    
    <div class="row g-3">
      <div class="col-md-3">
        <label for="imageInput" class="form-label fw-bold">Select Images</label>
        <input type="file" class="form-control" id="imageInput" accept="image/png, image/jpeg, image/webp, image/avif" multiple>
      </div>

      <div class="col-md-2">
        <label for="formatSelect" class="form-label fw-bold">Convert To</label>
        <select class="form-select" id="formatSelect">
          <option value="image/webp">WebP (Optimized)</option>
          <option value="image/avif">AVIF (Next-Gen)</option>
          <option value="image/png">PNG (Lossless)</option>
          <option value="image/jpeg">JPEG (Standard)</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="qualitySelect" class="form-label fw-bold">Visual Quality</label>
        <select class="form-select" id="qualitySelect">
          <option value="medium">Medium (60%)</option>
          <option value="max">Maximum (95%)</option>
          <option value="high">High (80%)</option>
          <option value="low">Low (40%)</option>
          <option value="min">Minimum (20%)</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="speedSelect" class="form-label fw-bold">Processing Speed</label>
        <select class="form-select" id="speedSelect">
          <option value="1">1 - Very Fast</option>
          <option value="0">0 - Instant</option>
          <option value="2">2 - Balanced</option>
          <option value="3">3 - Slow</option>
          <option value="4">4 - Max Compression</option>
        </select>
      </div>

      <div class="col-md-1">
        <label for="threadsSelect" class="form-label fw-bold">Threads</label>
        <select class="form-select" id="threadsSelect">
          <option value="4">4</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="6">6</option>
          <option value="8">8</option>
        </select>
      </div>
      
      <div class="col-md-2 d-flex align-items-end gap-2">
        <button class="btn btn-primary flex-grow-1" id="convertBtn" disabled>Convert</button>
        <button class="btn btn-outline-success d-none" id="downloadZipBtn">ZIP</button>
      </div>
    </div>
    
    <div id="status" class="mt-3 text-center h6 fw-normal text-secondary"></div>
  </div>

  <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3" id="matrixContainer"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script id="worker-script" type="text/plain">
  import * as avifCodec from "https://unpkg.com/@jsquash/avif@1.0.2/index.js?module";
  import * as webpCodec from "https://unpkg.com/@jsquash/webp@1.2.0/index.js?module";

  self.onmessage = async (e) => {
    const { type, arrayBuffer, fileType, fileName, targetMime, rawQuality, targetEffort, index, qLevel, rotation, imageData } = e.data;
    
    try {
      // Handle data coming back from main thread canvas conversion
      if (type === 'CONTINUE_ENCODE') {
        await executeEncode(imageData, targetMime, qLevel, rawQuality, targetEffort, index);
        return;
      }

      // Intercept rotated file pipelines immediately
      if (rotation > 0) {
        self.postMessage({ type: 'NEED_CANVAS_DECODE', index });
        return;
      }

      let decodedData;
      if (fileType === 'image/avif' || fileName.endsWith('.avif')) {
        decodedData = await avifCodec.decode(arrayBuffer);
      } else if (fileType === 'image/webp' || fileName.endsWith('.webp')) {
        decodedData = await webpCodec.decode(arrayBuffer);
      } else {
        self.postMessage({ type: 'NEED_CANVAS_DECODE', index });
        return;
      }

      await executeEncode(decodedData, targetMime, qLevel, rawQuality, targetEffort, index);
    } catch (err) {
      console.error(`[Worker Image ${index}] Error during decoding stage:`, err);
      self.postMessage({ type: 'ERROR', index, error: err.message });
    }
  };

  async function executeEncode(imageData, targetMime, qLevel, rawQuality, targetEffort, index) {
    try {
      let outputBuffer;
      if (targetMime === 'image/avif') {
        const avifQuality = qLevel === 'max' ? 82 : Math.round(rawQuality * 0.85);
        outputBuffer = await avifCodec.encode(imageData, { quality: avifQuality, effort: targetEffort });
      } else if (targetMime === 'image/webp') {
        outputBuffer = await webpCodec.encode(imageData, { quality: rawQuality, effort: targetEffort });
      } else {
        self.postMessage({ type: 'NEED_CANVAS_ENCODE', index, imageData });
        return;
      }

      self.postMessage({ 
        type: 'SUCCESS', 
        index, 
        outputBuffer, 
        width: imageData.width, 
        height: imageData.height 
      }, [outputBuffer]);
    } catch(err) {
      console.error(`[Worker Image ${index}] Error during WASM encoding stage:`, err);
      self.postMessage({ type: 'ERROR', index, error: err.message });
    }
  }
</script>

<script type="module">
  const imageInput = document.getElementById('imageInput');
  const formatSelect = document.getElementById('formatSelect');
  const qualitySelect = document.getElementById('qualitySelect');
  const speedSelect = document.getElementById('speedSelect');
  const threadsSelect = document.getElementById('threadsSelect');
  const convertBtn = document.getElementById('convertBtn');
  const downloadZipBtn = document.getElementById('downloadZipBtn');
  const resetConfigBtn = document.getElementById('resetConfigBtn');
  const statusElement = document.getElementById('status');
  const matrixContainer = document.getElementById('matrixContainer');

  let selectedFiles = [];
  let convertedFiles = [];
  let fileRotations = {};
  const qualityValues = { max: 95, high: 80, medium: 60, low: 40, min: 20 };
  const DEFAULT_CONFIG = { format: 'image/webp', quality: 'medium', speed: '1', threads: '4' };

  const workerCode = document.getElementById('worker-script').textContent;
  const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
  const workerUrl = URL.createObjectURL(workerBlob);

  function loadSavedConfig() {
    formatSelect.value = localStorage.getItem('img_format') || DEFAULT_CONFIG.format;
    qualitySelect.value = localStorage.getItem('img_quality') || DEFAULT_CONFIG.quality;
    speedSelect.value = localStorage.getItem('img_speed') || DEFAULT_CONFIG.speed;
    threadsSelect.value = localStorage.getItem('img_threads') || DEFAULT_CONFIG.threads;
  }

  function saveConfig() {
    localStorage.setItem('img_format', formatSelect.value);
    localStorage.setItem('img_quality', qualitySelect.value);
    localStorage.setItem('img_speed', speedSelect.value);
    localStorage.setItem('img_threads', threadsSelect.value);
  }

  loadSavedConfig();
  formatSelect.addEventListener('change', saveConfig);
  qualitySelect.addEventListener('change', saveConfig);
  speedSelect.addEventListener('change', saveConfig);
  threadsSelect.addEventListener('change', saveConfig);

  resetConfigBtn.addEventListener('click', () => {
    localStorage.clear();
    loadSavedConfig();
    const originalText = resetConfigBtn.innerHTML;
    resetConfigBtn.innerHTML = "Reset Done!";
    resetConfigBtn.classList.replace('btn-danger', 'btn-secondary');
    setTimeout(() => {
      resetConfigBtn.innerHTML = originalText;
      resetConfigBtn.classList.replace('btn-secondary', 'btn-danger');
    }, 1200);
  });

  imageInput.addEventListener('change', (e) => {
    selectedFiles = Array.from(e.target.files);
    convertBtn.disabled = selectedFiles.length === 0;
    downloadZipBtn.classList.add('d-none');
    convertedFiles = [];
    fileRotations = {};
    statusElement.innerText = selectedFiles.length > 0 ? `${selectedFiles.length} files selected.` : "";
    matrixContainer.innerHTML = '';
    selectedFiles.forEach((file, index) => {
      fileRotations[index] = 0;
      createImageCard(file, index);
    });
  });

  convertBtn.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;

    const targetMime = formatSelect.value;
    const targetExt = targetMime.split('/')[1].replace('jpeg', 'jpg');
    const qLevel = qualitySelect.value;
    const rawQuality = qualityValues[qLevel];
    const targetEffort = parseInt(speedSelect.value, 10);
    const maxThreads = parseInt(threadsSelect.value, 10);
    
    convertBtn.disabled = true;
    imageInput.disabled = true;
    formatSelect.disabled = true;
    qualitySelect.disabled = true;
    speedSelect.disabled = true;
    threadsSelect.disabled = true;
    document.querySelectorAll('.rotate-btn').forEach(btn => btn.disabled = true);
    downloadZipBtn.classList.add('d-none');
    convertedFiles = [];
    
    let processedCount = 0;
    const globalStartTime = performance.now();
    const queue = [...selectedFiles.map((file, index) => ({ file, index }))];
    const activeWorkers = [];

    await new Promise((resolve) => {
      function launchNext() {
        if (queue.length === 0 && activeWorkers.length === 0) {
          resolve();
          return;
        }

        while (activeWorkers.length < maxThreads && queue.length > 0) {
          const { file, index } = queue.shift();
          updateCardStatus(index, 'processing');
          const imageStartTime = performance.now();
          const rotation = fileRotations[index] || 0;

          const worker = new Worker(workerUrl, { type: 'module' });
          activeWorkers.push(worker);

          worker.onmessage = async (e) => {
            const msg = e.data;

            if (msg.type === 'NEED_CANVAS_DECODE') {
              try {
                const imgData = await decodeWithCanvas(file, rotation);
                document.getElementById(`res-${index}`).innerText = `${imgData.width}x${imgData.height} px`;
                
                if (targetMime === 'image/png' || targetMime === 'image/jpeg') {
                  const outBuf = await encodeWithCanvas(imgData, targetMime, rawQuality / 100);
                  finalizeFile(outBuf, imgData.width, imgData.height, file, index, targetExt, targetMime, imageStartTime);
                  cleanupWorker(worker);
                } else {
                  worker.postMessage({ 
                    type: 'CONTINUE_ENCODE', 
                    imageData: imgData, 
                    targetMime, 
                    qLevel, 
                    rawQuality, 
                    targetEffort, 
                    index 
                  });
                }
              } catch(err) {
                console.error(`[Main Thread Image ${index}] Canvas rotation preprocessing crashed:`, err);
                handleFailure(index, worker);
              }
            } 
            else if (msg.type === 'NEED_CANVAS_ENCODE') {
              try {
                const outBuf = await encodeWithCanvas(msg.imageData, targetMime, rawQuality / 100);
                finalizeFile(outBuf, msg.imageData.width, msg.imageData.height, file, index, targetExt, targetMime, imageStartTime);
                cleanupWorker(worker);
              } catch (err) {
                console.error(`[Main Thread Image ${index}] Fallback Canvas encoding failed:`, err);
                handleFailure(index, worker);
              }
            } 
            else if (msg.type === 'SUCCESS') {
              finalizeFile(msg.outputBuffer, msg.width, msg.height, file, index, targetExt, targetMime, imageStartTime);
              cleanupWorker(worker);
            } 
            else if (msg.type === 'ERROR') {
              console.error(`[Main Thread Image ${index}] Worker caught internal failure code.`);
              handleFailure(index, worker);
            }
          };

          file.arrayBuffer().then(buf => {
            worker.postMessage({
              arrayBuffer: buf,
              fileType: file.type,
              fileName: file.name,
              targetMime,
              rawQuality,
              targetEffort,
              index,
              qLevel,
              rotation
            }, [buf]);
          }).catch((err) => {
            console.error(`[Main Thread Image ${index}] Could not generate file arrayBuffer array:`, err);
            handleFailure(index, worker);
          });
        }
      }

      function cleanupWorker(worker) {
        worker.terminate();
        const idx = activeWorkers.indexOf(worker);
        if (idx > -1) activeWorkers.splice(idx, 1);
        processedCount++;
        statusElement.innerText = `Processed ${processedCount} of ${selectedFiles.length} images...`;
        launchNext();
      }

      function handleFailure(index, worker) {
        updateCardStatus(index, 'error');
        cleanupWorker(worker);
      }

      launchNext();
    });

    const globalEndTime = performance.now();
    const totalDuration = ((globalEndTime - globalStartTime) / 1000).toFixed(2);

    statusElement.innerHTML = `<strong class="text-success">Conversion finished!</strong> Processed all images in <span class="badge bg-dark">${totalDuration} seconds</span> using ${threadsSelect.value} threads.`;
    
    convertBtn.disabled = false;
    imageInput.disabled = false;
    formatSelect.disabled = false;
    qualitySelect.disabled = false;
    speedSelect.disabled = false;
    threadsSelect.disabled = false;
    document.querySelectorAll('.rotate-btn').forEach(btn => btn.disabled = false);

    if (convertedFiles.length > 0) downloadZipBtn.classList.remove('d-none');
  });

  function finalizeFile(buffer, width, height, file, index, targetExt, targetMime, imageStartTime) {
    document.getElementById(`res-${index}`).innerText = `${width}x${height} px`;
    const blob = new Blob([buffer], { type: targetMime });
    const url = URL.createObjectURL(blob);
    const originalName = file.name.substring(0, file.name.lastIndexOf('.'));
    const finalFileName = `${originalName}.${targetExt}`;
    
    convertedFiles.push({ name: finalFileName, blob });
    
    const durationSec = ((performance.now() - imageStartTime) / 1000).toFixed(2);
    document.getElementById(`time-${index}`).innerText = `${durationSec}s`;

    const percentage = Math.round((blob.size / file.size) * 100);
    const difference = percentage - 100;
    let weightText = `${percentage}% of original`;
    let badgeColor = "bg-success";
    
    if (difference < 0) weightText += ` (${difference}%)`;
    else if (difference > 0) { weightText += ` (+${difference}%)`; badgeColor = "bg-danger"; }

    updateCardStatus(index, 'complete', url, finalFileName, weightText, badgeColor);
  }

  downloadZipBtn.addEventListener('click', async () => {
    if (convertedFiles.length === 0) return;
    downloadZipBtn.disabled = true;
    downloadZipBtn.innerText = "...";
    
    const zip = new JSZip();
    convertedFiles.forEach(file => zip.file(file.name, file.blob));
    
    try {
      const zipContent = await zip.generateAsync({ type: "blob" });
      const zipUrl = URL.createObjectURL(zipContent);
      const link = document.createElement('a');
      link.href = zipUrl;
      link.download = "converted_images.zip";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(zipUrl);
    } catch (err) {
      console.error(err);
    } finally {
      downloadZipBtn.disabled = false;
      downloadZipBtn.innerText = "ZIP";
    }
  });

  function createImageCard(file, index) {
    const col = document.createElement('div');
    col.className = 'col';
    col.id = `card-col-${index}`;
    const previewUrl = URL.createObjectURL(file);
    const origExt = file.name.split('.').pop().toUpperCase();

    col.innerHTML = `
      <div class="card h-100 shadow-sm">
        <div class="img-container">
          <button class="btn btn-light btn-sm shadow-sm rotate-btn" id="rotate-btn-${index}" title="Rotate image 90° clockwise">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
            </svg>
          </button>
          <img src="${previewUrl}" class="card-img-top" id="preview-img-${index}" alt="Preview">
        </div>
        <div class="card-body p-2 d-flex flex-column">
          <p class="card-title text-truncate mb-1 font-weight-bold" style="font-size: 0.85rem;" title="${file.name}">${file.name}</p>
          <div class="img-meta mb-2">
            <div><strong>Format:</strong> <span class="badge bg-light text-dark border">${origExt}</span></div>
            <div><strong>Dim:</strong> <span id="res-${index}">Calculating...</span></div>
            <div><strong>Time:</strong> <span id="time-${index}" class="text-primary fw-bold">...</span></div>
          </div>
          <div class="mt-auto text-center mb-1" id="status-container-${index}">
            <span class="badge bg-secondary status-badge">Waiting</span>
          </div>
          <div id="weight-container-${index}" class="text-center my-1" style="font-size: 0.75rem;"></div>
          <a id="download-btn-${index}" class="btn btn-success btn-sm w-100 mt-1 d-none" download>Download</a>
        </div>
      </div>
    `;
    matrixContainer.appendChild(col);
    
    const imgEl = col.querySelector(`#preview-img-${index}`);
    const rotBtn = col.querySelector(`#rotate-btn-${index}`);

    imgEl.onload = () => {
      document.getElementById(`res-${index}`).innerText = `${imgEl.naturalWidth}x${imgEl.naturalHeight} px`;
    };

    rotBtn.addEventListener('click', () => {
      fileRotations[index] = (fileRotations[index] + 90) % 360;
      imgEl.style.transform = `rotate(${fileRotations[index]}deg)`;
    });
  }

  function updateCardStatus(index, state, downloadUrl = null, fileName = null, weightText = "", badgeColor = "bg-success") {
    const statusContainer = document.getElementById(`status-container-${index}`);
    const weightContainer = document.getElementById(`weight-container-${index}`);
    const downloadBtn = document.getElementById(`download-btn-${index}`);

    if (state === 'processing') {
      statusContainer.classList.remove('d-none');
      statusContainer.innerHTML = `
        <div class="spinner-border spinner-border-sm text-primary" role="status"><span class="visually-hidden">...</span></div>
        <span class="text-primary status-badge ms-1">Processing...</span>`;
    } else if (state === 'complete') {
      statusContainer.classList.add('d-none');
      weightContainer.innerHTML = `<span class="badge ${badgeColor}" style="font-size: 0.7rem;">${weightText}</span>`;
      downloadBtn.href = downloadUrl;
      downloadBtn.download = fileName;
      downloadBtn.classList.remove('d-none');
    } else if (state === 'error') {
      statusContainer.classList.remove('d-none');
      statusContainer.innerHTML = `<span class="badge bg-danger status-badge">Error</span>`;
    }
  }

  function decodeWithCanvas(file, rotation = 0) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const isSidelong = rotation === 90 || rotation === 270;
        
        canvas.width = isSidelong ? img.naturalHeight : img.naturalWidth;
        canvas.height = isSidelong ? img.naturalWidth : img.naturalHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate((rotation * Math.PI) / 180);
        ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
        
        resolve(ctx.getImageData(0, 0, canvas.width, canvas.height));
        URL.revokeObjectURL(img.src);
      };
      img.onerror = (err) => {
        console.error("Canvas Image object decoder failed to parse file descriptor reference.", err);
        reject(err);
      };
    });
  }

  function encodeWithCanvas(imageData, mimeType, quality) {
    return new Promise((resolve, reject) => {
      const canvas = document.createElement('canvas');
      canvas.width = imageData.width;
      canvas.height = imageData.height;
      const ctx = canvas.getContext('2d');
      ctx.putImageData(imageData, 0, 0);
      canvas.toBlob((blob) => {
        if (!blob) {
          reject(new Error("Canvas export returned empty blob stream structure data."));
          return;
        }
        blob.arrayBuffer().then(resolve);
      }, mimeType, quality);
    });
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
